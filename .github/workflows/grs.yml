name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *" # 每天凌晨 3 點自動更新
  push:
    branches: [ main ]
  workflow_dispatch:   # 讓你可以手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      # - name: Generate stats card
      #   uses: readme-tools/github-readme-stats-action@v1
      #   with:
      #     card: stats
      #     options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&theme=dark
      #     path: profile/stats.svg
      #     token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&hide=perl,MATLAB&stats_format=bytes&layout=compact&langs_count=12&show_icons=true&count_private=true&theme=dark&size_weight=0.5&count_weight=0.5
          path: profile/top-langs.svg
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      # - name: Generate pin card
      #   uses: readme-tools/github-readme-stats-action@v1
      #   with:
      #     card: pin
      #     options: username=readme-tools&repo=github-readme-stats
      #     path: profile/pin-readme-tools-github-readme-stats.svg
      #     token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p profile
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
